name: CI & Publish to NPM
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20.x
      - run: npm install
      - run: npx eslint .
      - run: npx tsc
      - run: npm test

  publish:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'
      - run: npm install
      - name: Publish package on NPM 📦
        run: |
          npm publish --provenance --access public 2>&1 | tee /tmp/npm-publish.log; EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ] && grep -q "previously published" /tmp/npm-publish.log; then
            echo "Version already published, nothing to do"
            exit 0
          fi
          exit $EXIT
