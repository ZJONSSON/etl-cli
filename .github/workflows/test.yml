name: Node.js CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Linting with ESLint
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - run: npm install
      - run: npx eslint .
      - run: npx tsc
      - run: npm test
